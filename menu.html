<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>مطعم الطيبيين للأكلات الشعبية المصرية</title>
  <meta name="description" content="مطعم الطيبيين للأكلات الشعبية المصرية - قائمة الطعام التفاعلية">
  <meta name="theme-color" content="#1a0a00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="الطيبيين">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- Google Fonts - Arabic & Display -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Scheherazade+New:wght@400;700&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #c8962a;
      --gold-light: #e8b84b;
      --gold-dark: #8b6518;
      --copper: #b87333;
      --deep-brown: #1a0800;
      --warm-brown: #2d1200;
      --parchment: #f5e6c8;
      --parchment-dark: #e8d5a8;
      --cream: #fdf5e6;
      --red: #8b1a1a;
      --red-light: #c0392b;
      --shadow: rgba(0,0,0,0.7);
      --text-dark: #1a0800;
      --text-gold: #c8962a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: 'Cairo', 'Amiri', serif;
      background: var(--deep-brown);
      direction: rtl;
    }

    /* ══════════════ LOADING SCREEN ══════════════ */
    #loader {
      position: fixed; inset: 0; z-index: 9999;
      background: radial-gradient(ellipse at center, #3d1500 0%, #1a0800 50%, #0a0400 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.8s ease;
    }
    #loader .loader-logo {
      font-family: 'Amiri', serif;
      font-size: clamp(2rem, 6vw, 4rem);
      color: var(--gold-light);
      text-shadow: 0 0 40px rgba(200,150,42,0.8);
      animation: pulse-glow 2s ease-in-out infinite;
      text-align: center;
      line-height: 1.4;
    }
    #loader .loader-sub {
      font-size: clamp(0.9rem, 2.5vw, 1.2rem);
      color: var(--copper);
      margin-top: 1rem;
      font-family: 'Cairo', sans-serif;
    }
    #loader .loader-bar-wrap {
      width: 200px; height: 3px;
      background: rgba(200,150,42,0.2);
      border-radius: 3px;
      margin-top: 2rem;
      overflow: hidden;
    }
    #loader .loader-bar {
      height: 100%; width: 0;
      background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
      border-radius: 3px;
      animation: load-progress 2s ease forwards;
    }
    .loader-ornament {
      font-size: 2rem;
      color: var(--gold);
      margin: 0.5rem;
      opacity: 0.6;
    }
    @keyframes pulse-glow {
      0%,100% { text-shadow: 0 0 20px rgba(200,150,42,0.5); }
      50% { text-shadow: 0 0 60px rgba(200,150,42,1), 0 0 100px rgba(200,150,42,0.4); }
    }
    @keyframes load-progress {
      0% { width: 0; }
      100% { width: 100%; }
    }
    #loader.hidden { opacity: 0; pointer-events: none; }

    /* ══════════════ AMBIENT BACKGROUND ══════════════ */
    #app {
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at 20% 80%, #3d1200 0%, #1a0800 40%, #0d0500 100%);
      position: relative;
      overflow: hidden;
      display: flex; flex-direction: column;
    }

    /* Floating particles */
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
    .particle {
      position: absolute;
      width: 3px; height: 3px;
      background: radial-gradient(circle, var(--gold-light), transparent);
      border-radius: 50%;
      animation: float-particle linear infinite;
      opacity: 0;
    }
    @keyframes float-particle {
      0% { transform: translateY(100vh) translateX(0); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.4; }
      100% { transform: translateY(-10vh) translateX(calc(var(--drift, 30px))); opacity: 0; }
    }

    /* ══════════════ HEADER ══════════════ */
    .app-header {
      position: relative; z-index: 100;
      padding: 0.8rem 1.5rem;
      background: linear-gradient(180deg, rgba(10,4,0,0.95) 0%, rgba(26,8,0,0.8) 100%);
      border-bottom: 1px solid rgba(200,150,42,0.3);
      display: flex; align-items: center; justify-content: space-between;
      backdrop-filter: blur(10px);
      flex-shrink: 0;
    }
    .header-brand {
      display: flex; flex-direction: column; align-items: flex-end;
      gap: 0.1rem;
    }
    .brand-name {
      font-family: 'Amiri', serif;
      font-size: clamp(1rem, 3vw, 1.5rem);
      color: var(--gold-light);
      font-weight: 700;
      line-height: 1.2;
      text-shadow: 0 0 20px rgba(200,150,42,0.5);
    }
    .brand-tagline {
      font-size: clamp(0.6rem, 1.5vw, 0.75rem);
      color: var(--copper);
      font-family: 'Cairo', sans-serif;
    }
    .header-icon {
      font-size: 2.5rem;
      filter: drop-shadow(0 0 10px rgba(200,150,42,0.5));
    }
    .header-phone {
      display: flex; align-items: center; gap: 0.4rem;
      color: var(--parchment);
      font-size: 0.85rem;
      text-decoration: none;
      background: rgba(200,150,42,0.1);
      border: 1px solid rgba(200,150,42,0.3);
      padding: 0.3rem 0.7rem;
      border-radius: 20px;
      transition: all 0.3s;
    }
    .header-phone:hover { background: rgba(200,150,42,0.2); }

    /* ══════════════ VIEW TOGGLE ══════════════ */
    .view-toggle {
      position: relative; z-index: 100;
      display: flex; justify-content: center;
      padding: 0.6rem 1rem;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    .view-btn {
      padding: 0.4rem 1.2rem;
      border-radius: 20px;
      border: 1px solid rgba(200,150,42,0.4);
      background: rgba(200,150,42,0.08);
      color: var(--gold);
      font-family: 'Cairo', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    .view-btn.active {
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      color: var(--deep-brown);
      font-weight: 700;
      border-color: var(--gold-light);
      box-shadow: 0 0 15px rgba(200,150,42,0.4);
    }

    /* ══════════════ BOOK SCENE ══════════════ */
    #book-scene {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 10;
      perspective: 1500px;
      overflow: hidden;
      touch-action: none;
    }

    .book-container {
      position: relative;
      transform-style: preserve-3d;
      animation: book-open 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes book-open {
      0% { transform: rotateY(-45deg) scale(0.7); opacity: 0; }
      100% { transform: rotateY(0deg) scale(1); opacity: 1; }
    }

    .book {
      position: relative;
      width: min(85vw, 420px);
      aspect-ratio: 3/4;
      transform-style: preserve-3d;
      cursor: pointer;
    }

    /* Book spine shadow */
    .book::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 2%;
      width: 4px;
      height: 96%;
      background: linear-gradient(180deg, transparent, rgba(0,0,0,0.8), transparent);
      transform: translateX(-50%);
      z-index: 50;
      pointer-events: none;
    }

    /* ══════════════ PAGES ══════════════ */
    .page {
      position: absolute;
      inset: 0;
      border-radius: 4px 16px 16px 4px;
      transform-origin: left center;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.645, 0.045, 0.355, 1.000);
      backface-visibility: hidden;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
    }

    .page.turning {
      transition: transform 0.7s cubic-bezier(0.645, 0.045, 0.355, 1.000);
    }

    .page-front, .page-back {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 4px 16px 16px 4px;
      overflow: hidden;
    }

    .page-back {
      transform: rotateY(180deg);
      border-radius: 16px 4px 4px 16px;
    }

    /* Page texture */
    .page-front::after, .page-back::after {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.4;
    }

    /* Page curl corner */
    .page-curl {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 40px;
      height: 40px;
      background: linear-gradient(225deg, var(--parchment-dark) 0%, transparent 50%);
      cursor: pointer;
      z-index: 200;
      border-radius: 0 0 16px 0;
      transition: all 0.3s;
      opacity: 0.5;
    }
    .page-curl:hover { opacity: 1; width: 55px; height: 55px; }

    /* ══════════════ PAGE CONTENT STYLES ══════════════ */
    .page-content {
      width: 100%; height: 100%;
      padding: 1rem 1rem;
      display: flex;
      flex-direction: column;
      position: relative;
      direction: rtl;
      overflow: hidden;
    }

    /* Cover page */
    .cover-content {
      background: 
        radial-gradient(ellipse at 30% 20%, rgba(200,150,42,0.15) 0%, transparent 50%),
        linear-gradient(160deg, #2d1000 0%, #1a0800 40%, #0d0400 100%);
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 0.5rem;
    }
    .cover-ornament {
      font-family: 'Amiri', serif;
      font-size: 3rem;
      color: var(--gold);
      text-shadow: 0 0 30px rgba(200,150,42,0.7);
      line-height: 1;
      animation: float-anim 3s ease-in-out infinite;
    }
    @keyframes float-anim {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .cover-title {
      font-family: 'Amiri', serif;
      font-size: clamp(1.2rem, 4vw, 1.8rem);
      color: var(--gold-light);
      text-shadow: 0 0 30px rgba(200,150,42,0.5);
      line-height: 1.4;
      font-weight: 700;
    }
    .cover-subtitle {
      font-family: 'Cairo', sans-serif;
      font-size: clamp(0.7rem, 2vw, 0.9rem);
      color: var(--copper);
      line-height: 1.5;
    }
    .cover-divider {
      width: 80%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0.5rem 0;
    }
    .cover-cta {
      margin-top: 0.5rem;
      padding: 0.5rem 1.5rem;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      color: var(--deep-brown);
      border: none;
      border-radius: 30px;
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(200,150,42,0.4);
      animation: pulse-btn 2s ease-in-out infinite;
    }
    @keyframes pulse-btn {
      0%,100% { box-shadow: 0 4px 20px rgba(200,150,42,0.4); }
      50% { box-shadow: 0 4px 35px rgba(200,150,42,0.8); }
    }

    /* Inner pages */
    .inner-content {
      background: 
        radial-gradient(ellipse at 50% 0%, rgba(200,150,42,0.06) 0%, transparent 60%),
        linear-gradient(180deg, #f0dfc0 0%, #e8d4a0 50%, #f2e4c4 100%);
      position: relative;
    }
    .inner-content::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 28px,
          rgba(180,130,50,0.07) 28px,
          rgba(180,130,50,0.07) 29px
        );
      pointer-events: none;
    }

    .page-header {
      text-align: center;
      margin-bottom: 0.4rem;
      padding-bottom: 0.3rem;
      border-bottom: 2px solid rgba(200,150,42,0.4);
      flex-shrink: 0;
    }
    .page-category-title {
      font-family: 'Amiri', serif;
      font-size: clamp(1rem, 3vw, 1.3rem);
      color: var(--red);
      font-weight: 700;
      text-shadow: 1px 1px 0 rgba(200,150,42,0.3);
    }
    .page-category-icon {
      font-size: 1.2rem;
      margin-left: 0.3rem;
    }

    /* Menu items in book */
    .menu-section { margin-bottom: 0.5rem; flex-shrink: 0; }
    .section-title {
      font-family: 'Amiri', serif;
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      color: var(--red);
      font-weight: 700;
      text-align: center;
      padding: 0.2rem 0;
      border-bottom: 1px solid rgba(200,150,42,0.3);
      margin-bottom: 0.3rem;
    }

    .menu-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 0.18rem 0.3rem;
      border-radius: 3px;
      transition: background 0.2s;
    }
    .menu-row:hover { background: rgba(200,150,42,0.08); }
    .menu-row .dots {
      flex: 1;
      border-bottom: 1px dotted rgba(100,60,0,0.3);
      margin: 0 0.3rem;
      height: 1px;
      align-self: center;
    }
    .item-name {
      font-family: 'Cairo', sans-serif;
      font-size: clamp(0.58rem, 1.6vw, 0.72rem);
      color: var(--text-dark);
      font-weight: 600;
      flex-shrink: 0;
      max-width: 55%;
    }
    .item-price {
      font-family: 'Cairo', sans-serif;
      font-size: clamp(0.56rem, 1.5vw, 0.68rem);
      color: var(--red);
      font-weight: 700;
      flex-shrink: 0;
      direction: ltr;
    }
    .price-tag::after { content: ' ﷼'; color: var(--gold-dark); }

    /* Multi-price table */
    .price-table { width: 100%; border-collapse: collapse; }
    .price-table th {
      font-family: 'Cairo', sans-serif;
      font-size: 0.55rem;
      color: var(--gold-dark);
      padding: 0.1rem 0.2rem;
      text-align: center;
      border-bottom: 1px solid rgba(200,150,42,0.3);
    }
    .price-table td {
      font-family: 'Cairo', sans-serif;
      font-size: 0.58rem;
      color: var(--text-dark);
      padding: 0.12rem 0.2rem;
      text-align: center;
      border-bottom: 1px dotted rgba(100,60,0,0.15);
    }
    .price-table td:first-child { text-align: right; font-weight: 600; font-size: 0.6rem; }
    .price-table tr:hover td { background: rgba(200,150,42,0.05); }

    /* Scroll within book page */
    .page-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: rgba(200,150,42,0.3) transparent;
      padding-right: 2px;
    }
    .page-scroll::-webkit-scrollbar { width: 3px; }
    .page-scroll::-webkit-scrollbar-thumb { background: rgba(200,150,42,0.4); border-radius: 3px; }

    /* Back cover */
    .back-cover-content {
      background: linear-gradient(160deg, #2d1000 0%, #1a0800 100%);
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 0.8rem;
    }

    /* ══════════════ NAVIGATION ARROWS ══════════════ */
    .book-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .book-nav.nav-left { left: -3rem; }
    .book-nav.nav-right { right: -3rem; }
    .nav-btn {
      width: 2.2rem; height: 2.2rem;
      border-radius: 50%;
      border: 1px solid rgba(200,150,42,0.4);
      background: rgba(26,8,0,0.8);
      color: var(--gold);
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }
    .nav-btn:hover {
      background: rgba(200,150,42,0.2);
      border-color: var(--gold);
      box-shadow: 0 0 15px rgba(200,150,42,0.4);
    }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Page indicator */
    .page-indicator {
      position: absolute;
      bottom: -2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 0.4rem;
      z-index: 200;
    }
    .page-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(200,150,42,0.3);
      cursor: pointer;
      transition: all 0.3s;
    }
    .page-dot.active {
      background: var(--gold);
      box-shadow: 0 0 8px rgba(200,150,42,0.6);
      width: 18px; border-radius: 3px;
    }

    /* ══════════════ ALTERNATIVE GRID VIEW ══════════════ */
    #grid-view {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      z-index: 10;
    }
    #grid-view.active { display: block; }
    #book-scene.hidden { display: none; }

    .grid-search {
      display: flex; gap: 0.5rem;
      margin-bottom: 1rem;
      position: sticky; top: 0; z-index: 50;
    }
    .search-input {
      flex: 1;
      padding: 0.6rem 1rem;
      border-radius: 25px;
      border: 1px solid rgba(200,150,42,0.4);
      background: rgba(26,8,0,0.8);
      color: var(--parchment);
      font-family: 'Cairo', sans-serif;
      font-size: 0.85rem;
      outline: none;
      direction: rtl;
      backdrop-filter: blur(10px);
    }
    .search-input::placeholder { color: rgba(245,230,200,0.4); }
    .search-input:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(200,150,42,0.2); }

    .grid-section { margin-bottom: 2rem; }
    .grid-section-title {
      font-family: 'Amiri', serif;
      font-size: 1.3rem;
      color: var(--gold-light);
      text-align: center;
      margin-bottom: 0.8rem;
      padding: 0.5rem;
      border-bottom: 1px solid rgba(200,150,42,0.3);
      text-shadow: 0 0 15px rgba(200,150,42,0.3);
    }

    .grid-items {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 0.7rem;
    }

    .grid-item {
      background: linear-gradient(135deg, rgba(45,18,0,0.9), rgba(26,8,0,0.95));
      border: 1px solid rgba(200,150,42,0.2);
      border-radius: 12px;
      padding: 0.8rem;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .grid-item::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(200,150,42,0.1), transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .grid-item:hover {
      border-color: var(--gold);
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(200,150,42,0.2);
    }
    .grid-item:hover::before { opacity: 1; }

    .grid-item-emoji { font-size: 1.8rem; text-align: center; display: block; margin-bottom: 0.4rem; }
    .grid-item-name {
      font-family: 'Cairo', sans-serif;
      font-size: 0.78rem;
      color: var(--parchment);
      text-align: center;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 0.4rem;
    }
    .grid-item-price {
      font-family: 'Cairo', sans-serif;
      font-size: 0.85rem;
      color: var(--gold);
      text-align: center;
      font-weight: 700;
    }
    .grid-item-price .sar { font-size: 0.65rem; color: var(--copper); }
    .fav-btn {
      position: absolute;
      top: 0.4rem;
      left: 0.4rem;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      transition: transform 0.2s;
    }
    .fav-btn:active { transform: scale(1.4); }

    /* ══════════════ FOOTER ══════════════ */
    .app-footer {
      position: relative; z-index: 100;
      padding: 0.6rem 1rem;
      background: rgba(10,4,0,0.9);
      border-top: 1px solid rgba(200,150,42,0.2);
      text-align: center;
      flex-shrink: 0;
      backdrop-filter: blur(10px);
    }
    .footer-sig {
      font-family: 'Cairo', sans-serif;
      font-size: 0.75rem;
      color: rgba(200,150,42,0.7);
      display: flex; align-items: center; justify-content: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .footer-heart { color: #e74c3c; animation: heartbeat 1.4s ease-in-out infinite; }
    @keyframes heartbeat {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }
    .footer-fb {
      display: inline-flex; align-items: center; gap: 0.3rem;
      color: #4267B2;
      text-decoration: none;
      font-size: 0.75rem;
      transition: color 0.2s;
      padding: 0.2rem 0.6rem;

// ══════════════════════════════════════════════════════════
// PAGE BUILDER
// ══════════════════════════════════════════════════════════

function buildTableRows(headers, data) {
  let h = headers.map(h => `<th>${h}</th>`).join('');
  let rows = data.map(row => 
    `<tr>${row.map((c,i) => `<td>${c}</td>`).join('')}</tr>`
  ).join('');
  return `<table class="price-table"><thead><tr>${h}</tr></thead><tbody>${rows}</tbody></table>`;
}

function buildMenuItems(items) {
  return items.map(item => {
    if (item.highlight) {
      return `<div style="text-align:center;padding:0.5rem 0;background:linear-gradient(135deg,rgba(200,150,42,0.15),transparent);border-radius:8px;margin:0.3rem 0;">
        <div style="font-family:'Amiri',serif;font-size:clamp(0.9rem,2.5vw,1.1rem);color:var(--red);font-weight:700;">${item.name}</div>
        <div style="font-family:'Cairo',sans-serif;font-size:clamp(1rem,3vw,1.3rem);color:var(--gold);font-weight:900;">${item.price} <span style="font-size:0.7rem;color:var(--copper)">ريال سعودي</span></div>
        ${item.note ? `<div style="font-size:0.6rem;color:rgba(100,60,0,0.7);margin-top:0.2rem;">${item.note}</div>` : ''}
      </div>`;
    }
    return `<div class="menu-row">
      <span class="item-name">${item.name}</span>
      <span class="dots"></span>
      <span class="item-price"><span class="price-tag">${item.price}</span></span>
    </div>`;
  }).join('');
}

function buildPageContent(section) {
  let body = '';

  if (section.tableHeaders && section.tableData) {
    body += buildTableRows(section.tableHeaders, section.tableData);
  }
  if (section.subSections) {
    section.subSections.forEach(sub => {
      body += `<div class="section-title">${sub.title}</div>`;
      body += buildTableRows(sub.headers, sub.data);
    });
  }
  if (section.items) {
    body += buildMenuItems(section.items);
  }
  if (section.subNote) {
    body += `<div style="font-size:0.6rem;color:rgba(100,60,0,0.6);text-align:center;margin-top:0.3rem;">${section.subNote}</div>`;
  }
  if (section.footer) {
    body += `<div style="font-size:0.65rem;color:var(--red);text-align:center;margin-top:0.5rem;padding-top:0.3rem;border-top:1px solid rgba(200,150,42,0.3);font-weight:600;">${section.footer}</div>`;
  }

  return `<div class="page-content inner-content">
    <div class="page-header">
      <div class="page-category-title">${section.icon} ${section.title}</div>
    </div>
    <div class="page-scroll">${body}</div>
  </div>`;
}

// ══════════════════════════════════════════════════════════
// BOOK PAGES STRUCTURE
// ══════════════════════════════════════════════════════════

// Pages: cover, then pairs of menu sections, then back
const allPageContents = [null, ...MENU]; // index 0 = cover
const TOTAL_PAGES = allPageContents.length + 1; // +1 for back cover

let currentPage = 0; // 0 = cover visible

function buildBook() {
  const book = document.getElementById('book');
  book.innerHTML = '';

  // Create all pages
  allPageContents.forEach((section, idx) => {
    const page = document.createElement('div');
    page.className = 'page';
    page.id = `page-${idx}`;
    page.style.zIndex = allPageContents.length - idx;

    const front = document.createElement('div');
    front.className = 'page-front';
    
    const back = document.createElement('div');
    back.className = 'page-back';

    if (idx === 0) {
      // Cover
      front.innerHTML = `<div class="page-content cover-content">
        <div class="cover-ornament">🍽️</div>
        <div class="cover-title">مطعم الطيبيين<br><span style="font-size:0.65em;color:var(--copper)">للأكلات الشعبية المصرية</span></div>
        <div class="cover-divider"></div>
        <div class="cover-subtitle">العتيبيه - شارع الجزائر<br>بجوار بنشر شارع الجزائر وسوق الجوالات</div>
        <div style="color:var(--gold);font-size:0.8rem;margin:0.3rem 0;">📞 0561422312</div>
        <div class="cover-divider"></div>
        <div style="color:rgba(200,150,42,0.6);font-size:0.7rem;">✦ اسحب لفتح القائمة ✦</div>
        <button class="cover-cta" onclick="nextPage()">افتح القائمة 📖</button>
      </div>`;
      back.innerHTML = buildPageContent(allPageContents[1] || MENU[0]);
    } else if (idx === allPageContents.length - 1) {
      // Last page front
      front.innerHTML = buildPageContent(section);
      // Back cover
      back.innerHTML = `<div class="page-content back-cover-content">
        <div style="color:var(--gold);font-size:3rem;">🌟</div>
        <div style="font-family:'Amiri',serif;font-size:1.3rem;color:var(--gold-light);text-align:center;line-height:1.6;">شكراً لزيارتكم<br><span style="font-size:0.7em;color:var(--copper)">نأمل أن تنال أطباقنا إعجابكم</span></div>
        <div style="width:60%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0.8rem auto;"></div>
        <div style="color:var(--copper);font-size:0.8rem;text-align:center;font-family:'Cairo',sans-serif;">📞 0561422312</div>
        <div style="color:rgba(200,150,42,0.5);font-size:0.7rem;margin-top:0.5rem;">✦ مطعم الطيبيين ✦</div>
      </div>`;
    } else {
      // Middle pages
      front.innerHTML = buildPageContent(section);
      const nextSection = allPageContents[idx + 1];
      back.innerHTML = nextSection ? buildPageContent(nextSection) : '';
    }

    // Curl corner
    const curl = document.createElement('div');
    curl.className = 'page-curl';
    page.appendChild(front);
    page.appendChild(back);
    page.appendChild(curl);

    // Drag events
    setupPageDrag(page, idx);

    book.appendChild(page);
  });

  // Build page dots
  buildPageDots();
  updateNav();
}

// ══════════════════════════════════════════════════════════
// FLIP ANIMATION
// ══════════════════════════════════════════════════════════

function flipPage(pageIdx, direction) {
  const page = document.getElementById(`page-${pageIdx}`);
  if (!page) return;
  
  playFlipSound();
  vibrate();

  if (direction === 'forward') {
    page.style.transform = 'rotateY(-180deg)';
    page.style.zIndex = 100;
  } else {
    page.style.transform = 'rotateY(0deg)';
    page.style.zIndex = allPageContents.length - pageIdx;
  }
}

function nextPage() {
  if (currentPage >= allPageContents.length - 1) return;
  flipPage(currentPage, 'forward');
  currentPage++;
  updateNav();
  updateDots();
}

function prevPage() {
  if (currentPage <= 0) return;
  currentPage--;
  flipPage(currentPage, 'backward');
  updateNav();
  updateDots();
}

function updateNav() {
  document.getElementById('prev-btn').disabled = currentPage === 0;
  document.getElementById('next-btn').disabled = currentPage >= allPageContents.length - 1;
}

function buildPageDots() {
  const dots = document.getElementById('page-dots');
  dots.innerHTML = '';
  const count = Math.min(allPageContents.length, 8);
  for (let i = 0; i < count; i++) {
    const dot = document.createElement('div');
    dot.className = 'page-dot' + (i === 0 ? ' active' : '');
    dot.onclick = () => goToPage(i);
    dots.appendChild(dot);
  }
}

function updateDots() {
  const dots = document.querySelectorAll('.page-dot');
  const ratio = currentPage / Math.max(1, allPageContents.length - 1);
  const activeDot = Math.round(ratio * (dots.length - 1));
  dots.forEach((d, i) => d.classList.toggle('active', i === activeDot));
}

function goToPage(targetDotIdx) {
  const dots = document.querySelectorAll('.page-dot');
  const targetPage = Math.round((targetDotIdx / Math.max(1, dots.length - 1)) * (allPageContents.length - 1));
  while (currentPage < targetPage) nextPage();
  while (currentPage > targetPage) prevPage();
}

// ══════════════════════════════════════════════════════════
// DRAG / SWIPE SUPPORT
// ══════════════════════════════════════════════════════════

let touchStartX = 0;

document.getElementById('book-scene').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });

document.getElementById('book-scene').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 40) {
    if (dx < 0) nextPage(); // swipe left → next
    else prevPage(); // swipe right → prev
    document.getElementById('swipe-hint').style.display = 'none';
  }
}, { passive: true });

// Mouse drag on book
function setupPageDrag(page, idx) {
  page.addEventListener('click', (e) => {
    const rect = page.getBoundingClientRect();
    const clickX = e.clientX - rect.left;
    if (clickX > rect.width * 0.6) nextPage();
    else if (clickX < rect.width * 0.4) prevPage();
  });
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') nextPage();
  if (e.key === 'ArrowRight') prevPage();
});

// ══════════════════════════════════════════════════════════
// SOUND EFFECT
// ══════════════════════════════════════════════════════════

let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return audioCtx;
}

function playFlipSound() {
  try {
    const ctx = getAudioCtx();
    if (!ctx) return;
    
    const bufferSize = ctx.sampleRate * 0.12;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    
    for (let i = 0; i < bufferSize; i++) {
      const t = i / ctx.sampleRate;
      const env = Math.exp(-t * 25);
      data[i] = (Math.random() * 2 - 1) * env * 0.3;
      // Add a soft thump
      data[i] += Math.sin(2 * Math.PI * 180 * t) * Math.exp(-t * 40) * 0.15;
    }
    
    const source = ctx.createBufferSource();
    source.buffer = buffer;
    
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 800;
    filter.Q.value = 0.5;
    
    const gain = ctx.createGain();
    gain.gain.value = 0.6;
    
    source.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    source.start();
  } catch(e) {}
}

// ══════════════════════════════════════════════════════════
// VIBRATION
// ══════════════════════════════════════════════════════════

function vibrate() {
  if (navigator.vibrate) navigator.vibrate(30);
}

// ══════════════════════════════════════════════════════════
// VIEW SWITCHING
// ══════════════════════════════════════════════════════════

function switchView(view) {
  const bookScene = document.getElementById('book-scene');
  const gridView = document.getElementById('grid-view');
  
  if (view === 'book') {
    bookScene.classList.remove('hidden');
    gridView.classList.remove('active');
    document.getElementById('btn-book').classList.add('active');
    document.getElementById('btn-grid').classList.remove('active');
  } else {
    bookScene.classList.add('hidden');
    gridView.classList.add('active');
    document.getElementById('btn-grid').classList.add('active');
    document.getElementById('btn-book').classList.remove('active');
    buildGridView();
  }
}

// ══════════════════════════════════════════════════════════
// GRID VIEW
// ══════════════════════════════════════════════════════════

const favorites = new Set(JSON.parse(localStorage.getItem('fav') || '[]'));

function buildGridView(filter = '') {
  const container = document.getElementById('grid-content');
  container.innerHTML = '';
  
  MENU.forEach(section => {
    const allItems = [];
    if (section.items) {
      section.items.forEach(item => {
        if (!filter || item.name.includes(filter)) {
          allItems.push({ name: item.name, price: item.price, highlight: item.highlight });
        }
      });
    }
    if (section.tableData) {
      section.tableData.forEach(row => {
        const name = row[0];
        const price = row[row.length - 1];
        if (!filter || name.includes(filter)) {
          allItems.push({ name, price: price === '-' ? '؟' : price });
        }
      });
    }
    
    if (allItems.length === 0) return;
    
    const sec = document.createElement('div');
    sec.className = 'grid-section';
    sec.innerHTML = `<div class="grid-section-title">${section.icon} ${section.title}</div>
      <div class="grid-items">
        ${allItems.map((item, i) => `
          <div class="grid-item" id="gi-${section.id}-${i}">
            <button class="fav-btn" onclick="toggleFav('${section.id}-${i}', event)">${favorites.has(`${section.id}-${i}`) ? '❤️' : '🤍'}</button>
            <span class="grid-item-emoji">${section.emoji}</span>
            <div class="grid-item-name">${item.name}</div>
            <div class="grid-item-price">${item.price} <span class="sar">ريال</span></div>
          </div>
        `).join('')}
      </div>`;
    container.appendChild(sec);
  });
}

function filterGrid(val) {
  buildGridView(val);
}

function toggleFav(id, e) {
  e.stopPropagation();
  if (favorites.has(id)) {
    favorites.delete(id);
    showToast('تم إزالة من المفضلة');
  } else {
    favorites.add(id);
    showToast('تم الإضافة للمفضلة ❤️');
  }
  localStorage.setItem('fav', JSON.stringify([...favorites]));
  buildGridView(document.getElementById('search-input')?.value || '');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);

}

let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  setTimeout(() => {
    document.getElementById('install-banner').classList.add('show');
  }, 5000);
});

document.getElementById('install-yes').onclick = async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') showToast('جاري تثبيت التطبيق...');
    deferredPrompt = null;
  }
  document.getElementById('install-banner').classList.remove('show');
};
