<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#c9962b">

    <!-- ═══════════════════════════════════════════════
         PWA META — مطعم الطيبين
    ═══════════════════════════════════════════════ -->

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="مطعم الطيبين">

    <!-- Apple / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="الطيبين">

    <!-- Apple Touch Icons (iPhone / iPad all generations) -->
    <link rel="apple-touch-icon" sizes="57x57"   href="icons/icon-57x57.png">
    <link rel="apple-touch-icon" sizes="72x72"   href="icons/icon-72x72.png">
    <link rel="apple-touch-icon" sizes="76x76"   href="icons/icon-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="icons/icon-114x114.png">
    <link rel="apple-touch-icon" sizes="120x120" href="icons/icon-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="icons/icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180x180.png">

    <!-- Windows / Edge Tiles -->
    <meta name="msapplication-TileColor"          content="#1a0f00">
    <meta name="msapplication-TileImage"          content="icons/icon-windows-150x150.png">
    <meta name="msapplication-square70x70logo"    content="icons/icon-windows-70x70.png">
    <meta name="msapplication-square150x150logo"  content="icons/icon-windows-150x150.png">

    <!-- Favicon — SVG (modern) + ICO (legacy) + PNG fallbacks -->
    <link rel="icon" type="image/svg+xml"  href="favicon.svg">
    <link rel="icon" type="image/x-icon"   href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16x16.png">

    <!-- Web App Manifest -->
    <link rel="manifest" href="manifest.json">

    <meta name="description" content="مطعم الطيبين - أصيل المطبخ المصري">
    <title>مطعم الطيبين</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        /* =============================================
           DESIGN TOKENS
        ============================================= */
        :root {
            --gold:          #c9962b;
            --gold-light:    #e8b84b;
            --gold-dim:      #7a5a18;
            --cream:         #faf6ef;
            --cream-2:       #f3ece0;
            --cream-3:       #ede3d3;
            --parchment:     #e6d9c2;
            --dark:          #1a0f00;
            --dark-2:        #2a1c07;
            --dark-3:        #3a2a10;
            --text:          #1a0f00;
            --text-muted:    #6b5530;
            --text-faint:    #9a7d52;
            --divider:       rgba(180,140,60,0.18);
            --border:        rgba(180,140,60,0.24);
            --shadow-sm:     0 1px 3px rgba(50,25,0,0.08);
            --shadow-md:     0 4px 16px rgba(50,25,0,0.12);
            --shadow-lg:     0 12px 40px rgba(50,25,0,0.18);
            --radius-sm:     6px;
            --radius-md:     10px;
            --radius-lg:     16px;
            --radius-xl:     24px;
            --radius-full:   9999px;
            --font-display:  'Amiri', 'Georgia', serif;
            --font-body:     'Cairo', 'Helvetica Neue', sans-serif;
            --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
            --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
            --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
            --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
            --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);
            --text-2xl:  clamp(2rem,     1.2rem  + 2.5vw,  3.5rem);
            --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
            --space-4: 1rem;    --space-5: 1.25rem; --space-6: 1.5rem;
            --space-8: 2rem;    --space-10: 2.5rem; --space-12: 3rem;
            --space-16: 4rem;
        }

        /* =============================================
           BASE
        ============================================= */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
        body {
            font-family: var(--font-body);
            background: var(--cream);
            color: var(--text);
            min-height: 100dvh;
            overflow-x: hidden;
        }
        button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
        img { display: block; max-width: 100%; }
        /* ---- Food SVG Icons ---- */
        .item-svg-icon {
            flex-shrink: 0;
            width: 52px; height: 52px;
            display: flex; align-items: center; justify-content: center;
        }
        .item-svg-icon svg {
            width: 52px; height: 52px;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.13));
            transition: transform 220ms cubic-bezier(0.34,1.56,0.64,1);
        }
        .menu-item:hover .item-svg-icon svg {
            transform: scale(1.13) rotate(-4deg);
        }
        /* specific animations */
        @keyframes flame-flicker {
            0%,100% { transform: scaleY(1) rotate(-2deg); }
            50%      { transform: scaleY(1.1) rotate(2deg); }
        }
        @keyframes steam-rise {
            0%   { opacity:0; transform: translateY(0) scaleX(1); }
            50%  { opacity:.8; transform: translateY(-6px) scaleX(1.2); }
            100% { opacity:0; transform: translateY(-12px) scaleX(.8); }
        }
        @keyframes drip {
            0%,100%{ transform: translateY(0); }
            50%    { transform: translateY(3px); }
        }
        @keyframes swim {
            0%,100%{ transform: translateX(0) scaleX(1); }
            50%    { transform: translateX(3px) scaleX(1.04); }
        }
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
        @keyframes bounce-light {
            0%,100%{ transform: translateY(0); }
            50%    { transform: translateY(-4px); }
        }
        @keyframes bread-puff {
            0%,100%{ transform: scaleY(1); }
            50%    { transform: scaleY(1.06); }
        }
        @keyframes leaf-sway {
            0%,100%{ transform: rotate(-5deg); }
            50%    { transform: rotate(5deg); }
        }
        @keyframes bubble-float {
            0%,100%{ transform: translateY(0); opacity:.7; }
            50%    { transform: translateY(-4px); opacity:1; }
        }
        @keyframes sweet-pulse {
            0%,100%{ transform: scale(1); }
            50%    { transform: scale(1.06); }
        }
        .anim-flame  { animation: flame-flicker 0.9s ease-in-out infinite; transform-origin: bottom center; }
        .anim-steam  { animation: steam-rise 1.4s ease-in-out infinite; }
        .anim-steam2 { animation: steam-rise 1.4s ease-in-out infinite 0.5s; }
        .anim-steam3 { animation: steam-rise 1.4s ease-in-out infinite 0.9s; }
        .anim-drip   { animation: drip 1.2s ease-in-out infinite; }
        .anim-swim   { animation: swim 1.8s ease-in-out infinite; }
        .anim-spin   { animation: spin-slow 4s linear infinite; transform-origin: center; }
        .anim-bounce { animation: bounce-light 1.4s ease-in-out infinite; }
        .anim-bread  { animation: bread-puff 1.6s ease-in-out infinite; }
        .anim-leaf   { animation: leaf-sway 2s ease-in-out infinite; transform-origin: bottom center; }
        .anim-bubble { animation: bubble-float 1.2s ease-in-out infinite; }
        .anim-sweet  { animation: sweet-pulse 1.5s ease-in-out infinite; }

        ul { list-style: none; }

        /* =============================================
           HEADER
        ============================================= */
        .site-header {
            position: sticky; top: 0; z-index: 200;
            background: var(--dark);
            border-bottom: 1px solid rgba(201,150,43,0.2);
            padding: var(--space-3) var(--space-6);
            display: flex; align-items: center; justify-content: space-between;
            gap: var(--space-4);
        }
        .brand {
            display: flex; align-items: center; gap: var(--space-3);
            text-decoration: none;
        }
        .brand-logo {
            width: 58px; height: 58px; flex-shrink: 0; object-fit: contain;
        }
        .brand-text { display: flex; flex-direction: column; }
        .brand-name {
            font-family: var(--font-display);
            font-size: clamp(1.1rem, 3vw, 1.35rem);
            font-weight: 700;
            color: var(--gold-light);
            line-height: 1.2;
        }
        .brand-tagline {
            font-size: var(--text-xs);
            color: var(--gold-dim);
            font-weight: 600;
            letter-spacing: 0.02em;
        }
        .header-actions { display: flex; gap: var(--space-2); align-items: center; }
        .wa-share-btn {
            color: #25D366 !important;
            border-color: rgba(37,211,102,0.3) !important;
            transition: all 180ms;
        }
        .wa-share-btn:hover {
            background: rgba(37,211,102,0.1) !important;
            border-color: #25D366 !important;
            transform: scale(1.08);
        }

        .icon-btn {
            width: 42px; height: 42px; border-radius: var(--radius-full);
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(201,150,43,0.2);
            color: var(--gold-light);
            font-size: 1rem;
            transition: all 180ms cubic-bezier(0.16,1,0.3,1);
            position: relative;
        }
        .icon-btn:hover { background: rgba(201,150,43,0.1); border-color: var(--gold); }
        .badge {
            position: absolute; top: -4px; right: -4px;
            min-width: 18px; height: 18px; padding: 0 4px;
            background: #c84040; border-radius: var(--radius-full);
            font-size: 0.6rem; font-weight: 800; color: #fff;
            display: flex; align-items: center; justify-content: center;
            transform: scale(0); transition: transform 220ms cubic-bezier(0.68,-0.55,0.27,1.55);
        }
        .badge.show { transform: scale(1); }

        /* =============================================
           HERO BANNER
        ============================================= */
        .hero {
            background: var(--dark-2);
            padding: var(--space-10) var(--space-6) var(--space-8);
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid rgba(201,150,43,0.15);
        }
        .hero::before {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at 30% 60%, rgba(201,150,43,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 20%, rgba(201,150,43,0.05) 0%, transparent 50%);
            pointer-events: none;
        }
        .hero-ornament {
            font-family: var(--font-display);
            font-size: 2.2rem;
            color: var(--gold);
            margin-bottom: var(--space-3);
            opacity: 0.8;
            line-height: 1;
        }
        .hero-title {
            font-family: var(--font-display);
            font-size: var(--text-2xl);
            font-weight: 700;
            color: var(--gold-light);
            margin-bottom: var(--space-2);
            line-height: 1.25;
        }
        .hero-sub {
            font-size: var(--text-sm);
            color: rgba(230,217,194,0.65);
            font-weight: 400;
            max-width: 40ch;
            margin: 0 auto var(--space-6);
            line-height: 1.8;
        }
        .hero-badges {
            display: flex; gap: var(--space-3); justify-content: center; flex-wrap: wrap;
        }
        .hero-badge {
            display: flex; align-items: center; gap: var(--space-2);
            background: rgba(201,150,43,0.1);
            border: 1px solid rgba(201,150,43,0.2);
            border-radius: var(--radius-full);
            padding: var(--space-2) var(--space-4);
            font-size: var(--text-xs);
            color: rgba(230,217,194,0.8);
            font-weight: 600;
        }
        .hero-badge i { color: var(--gold); font-size: 0.75rem; }

        /* =============================================
           SEARCH & FILTERS
        ============================================= */
        .controls-bar {
            background: #fff;
            border-bottom: 1px solid var(--divider);
            padding: var(--space-4) var(--space-6);
            position: sticky; top: 62px; z-index: 100;
            box-shadow: var(--shadow-sm);
        }
        .search-field {
            position: relative;
            max-width: 480px;
            margin: 0 auto var(--space-4);
        }
        .search-field i {
            position: absolute; right: var(--space-4); top: 50%;
            transform: translateY(-50%);
            color: var(--text-faint); font-size: 0.9rem;
            pointer-events: none;
        }
        .search-input {
            width: 100%;
            padding: var(--space-3) var(--space-10) var(--space-3) var(--space-4);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-full);
            background: var(--cream);
            font-family: var(--font-body);
            font-size: var(--text-sm);
            color: var(--text);
            font-weight: 600;
            outline: none;
            transition: border-color 180ms, box-shadow 180ms;
        }
        .search-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201,150,43,0.12);
            background: #fff;
        }
        .search-input::placeholder { color: var(--text-faint); font-weight: 400; }

        .cat-strip {
            display: flex; gap: var(--space-2); overflow-x: auto;
            scrollbar-width: none; padding-bottom: 2px;
        }
        .cat-strip::-webkit-scrollbar { display: none; }
        .cat-pill {
            flex-shrink: 0;
            padding: var(--space-2) var(--space-4);
            border-radius: var(--radius-full);
            border: 1.5px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            font-size: var(--text-xs);
            font-weight: 700;
            font-family: var(--font-body);
            white-space: nowrap;
            transition: all 180ms cubic-bezier(0.16,1,0.3,1);
        }
        .cat-pill:hover { border-color: var(--gold); color: var(--gold); }
        .cat-pill.active {
            background: var(--dark);
            border-color: var(--dark);
            color: var(--gold-light);
        }
        .cat-pill i { margin-left: var(--space-2); font-size: 0.7rem; }

        /* =============================================
           MENU SECTIONS
        ============================================= */
        .menu-main {
            max-width: 900px;
            margin: 0 auto;
            padding: var(--space-8) var(--space-6) 120px;
        }
        .menu-section {
            margin-bottom: var(--space-12);
        }
        .section-header {
            display: flex; align-items: center; gap: var(--space-4);
            margin-bottom: var(--space-6);
            padding-bottom: var(--space-4);
            border-bottom: 1px solid var(--divider);
        }
        .section-icon {
            width: 48px; height: 48px; flex-shrink: 0;
            background: var(--cream-3);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-lg);
            display: flex; align-items: center; justify-content: center;
            color: var(--gold);
            font-size: 1.1rem;
        }
        .section-info { flex: 1; }
        .section-title {
            font-family: var(--font-display);
            font-size: var(--text-lg);
            font-weight: 700;
            color: var(--text);
            line-height: 1.3;
        }
        .section-count {
            font-size: var(--text-xs);
            color: var(--text-faint);
            font-weight: 600;
            margin-top: 2px;
        }
        .section-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to left, transparent, var(--divider));
        }

        /* =============================================
           MENU ITEMS
        ============================================= */
        .items-grid {
            display: grid;
            gap: var(--space-3);
        }
        .menu-item {
            display: flex;
            align-items: center;
            gap: var(--space-4);
            background: #fff;
            border: 1px solid var(--divider);
            border-radius: var(--radius-lg);
            padding: var(--space-4) var(--space-5);
            transition: all 180ms cubic-bezier(0.16,1,0.3,1);
            box-shadow: var(--shadow-sm);
        }
        .menu-item:hover {
            border-color: rgba(201,150,43,0.3);
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }
        .item-fav {
            flex-shrink: 0;
            width: 32px; height: 32px;
            border-radius: var(--radius-full);
            display: flex; align-items: center; justify-content: center;
            color: #c8a88a;
            font-size: 0.85rem;
            transition: all 180ms;
        }
        .item-fav:hover, .item-fav.on { color: #c84040; }
        .item-body { flex: 1; min-width: 0; }
        .item-name {
            font-size: var(--text-sm);
            font-weight: 800;
            color: var(--text);
            line-height: 1.4;
            margin-bottom: 3px;
        }
        .item-desc {
            font-size: var(--text-xs);
            color: var(--text-faint);
            line-height: 1.6;
            font-weight: 400;
        }
        .item-right {
            flex-shrink: 0;
            display: flex; flex-direction: column;
            align-items: flex-end; gap: var(--space-2);
        }
        .item-price {
            font-family: var(--font-body);
            font-size: var(--text-sm);
            font-weight: 900;
            color: var(--gold);
            line-height: 1;
        }
        .item-currency {
            font-size: 0.55rem;
            color: var(--text-faint);
            font-weight: 700;
            margin-top: 1px;
        }
        .add-btn {
            width: 32px; height: 32px;
            border-radius: var(--radius-full);
            border: 1.5px solid var(--gold);
            color: var(--gold);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem;
            transition: all 180ms cubic-bezier(0.16,1,0.3,1);
        }
        .add-btn:hover {
            background: var(--gold);
            color: #fff;
            box-shadow: 0 4px 12px rgba(201,150,43,0.3);
        }

        /* =============================================
           EMPTY STATE
        ============================================= */
        .empty-state {
            display: flex; flex-direction: column; align-items: center;
            text-align: center; padding: var(--space-16) var(--space-8);
            color: var(--text-muted);
        }
        .empty-icon {
            width: 56px; height: 56px; margin-bottom: var(--space-4);
            background: var(--cream-3); border-radius: var(--radius-xl);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; color: var(--gold-dim);
        }
        .empty-state h3 { color: var(--text); font-weight: 800; margin-bottom: var(--space-2); }
        .empty-state p { max-width: 32ch; line-height: 1.7; font-size: var(--text-sm); }

        /* =============================================
           BOTTOM NAV
        ============================================= */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--divider);
            display: flex; justify-content: space-around;
            padding: var(--space-2) 0 max(var(--space-2), env(safe-area-inset-bottom));
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 3px;
            color: var(--text-faint); font-size: 0.6rem; font-weight: 700;
            font-family: var(--font-body);
            padding: var(--space-2) var(--space-6);
            border-radius: var(--radius-md);
            transition: all 180ms;
            position: relative;
            min-width: 44px; min-height: 44px; justify-content: center;
        }
        .nav-item i { font-size: 1.05rem; transition: all 180ms; }
        .nav-item.active { color: var(--gold); }
        .nav-item .nav-badge {
            position: absolute; top: 4px; left: 10px;
            min-width: 16px; height: 16px; padding: 0 3px;
            background: #c84040; border-radius: var(--radius-full);
            font-size: 0.5rem; font-weight: 800; color: #fff;
            display: flex; align-items: center; justify-content: center;
            transform: scale(0); transition: transform 220ms cubic-bezier(0.68,-0.55,0.27,1.55);
        }
        .nav-item .nav-badge.show { transform: scale(1); }

        /* =============================================
           SIDE PANELS
        ============================================= */
        .overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 300; opacity: 0; visibility: hidden;
            transition: all 300ms;
        }
        .overlay.open { opacity: 1; visibility: visible; }
        .panel {
            position: fixed; top: 0; height: 100%;
            width: min(400px, 88vw);
            background: #fff;
            z-index: 301;
            display: flex; flex-direction: column;
            box-shadow: var(--shadow-lg);
            transition: transform 400ms cubic-bezier(0.16,1,0.3,1);
        }
        .panel.right-panel { right: 0; transform: translateX(100%); }
        .panel.left-panel  { left: 0;  transform: translateX(-100%); }
        .panel.right-panel.open { transform: translateX(0); }
        .panel.left-panel.open  { transform: translateX(0); }
        .panel-head {
            padding: var(--space-5) var(--space-5);
            border-bottom: 1px solid var(--divider);
            display: flex; align-items: center; justify-content: space-between;
            background: var(--cream);
        }
        .panel-head h3 {
            font-family: var(--font-display);
            font-size: var(--text-lg);
            font-weight: 700;
            color: var(--text);
            display: flex; align-items: center; gap: var(--space-3);
        }
        .panel-head h3 i { color: var(--gold); }
        .close-btn {
            width: 36px; height: 36px; border-radius: var(--radius-full);
            border: 1px solid var(--border); color: var(--text-muted);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem;
            transition: all 180ms;
        }
        .close-btn:hover { background: var(--cream-2); color: var(--text); }
        .panel-body { flex: 1; overflow-y: auto; padding: var(--space-4); }
        .panel-foot {
            padding: var(--space-4) var(--space-5);
            border-top: 1px solid var(--divider);
            background: var(--cream);
        }
        .total-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: var(--space-4);
        }
        .total-label { font-weight: 700; color: var(--text-muted); font-size: var(--text-sm); }
        .total-value {
            font-family: var(--font-display);
            font-size: var(--text-lg);
            font-weight: 700;
            color: var(--gold);
        }
        .order-btn {
            width: 100%; padding: var(--space-4);
            background: #25d366;
            border-radius: var(--radius-lg);
            color: #fff;
            font-family: var(--font-body);
            font-size: var(--text-sm);
            font-weight: 800;
            display: flex; align-items: center; justify-content: center;
            gap: var(--space-2);
            transition: all 180ms;
        }
        .order-btn:hover { background: #1aab52; box-shadow: 0 4px 16px rgba(37,211,102,0.3); }

        /* Cart rows */
        .cart-item {
            display: flex; align-items: center; gap: var(--space-3);
            padding: var(--space-3) 0;
            border-bottom: 1px solid var(--divider);
        }
        .cart-item:last-child { border-bottom: none; }
        .cart-name { flex: 1; font-size: var(--text-sm); font-weight: 700; color: var(--text); }
        .qty-ctrl { display: flex; align-items: center; gap: var(--space-2); }
        .qty-btn {
            width: 28px; height: 28px; border-radius: var(--radius-full);
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; color: var(--text-muted);
            transition: all 180ms;
        }
        .qty-btn:hover { border-color: var(--gold); color: var(--gold); }
        .qty-num { font-size: var(--text-sm); font-weight: 900; min-width: 20px; text-align: center; }
        .cart-price { font-size: var(--text-sm); font-weight: 800; color: var(--gold); min-width: 52px; text-align: left; }
        .del-btn { color: #c84040; font-size: 0.75rem; opacity: 0.5; padding: var(--space-2); transition: opacity 180ms; }
        .del-btn:hover { opacity: 1; }

        /* =============================================
           TOAST
        ============================================= */
        .toast-stack {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            z-index: 9000; display: flex; flex-direction: column;
            gap: var(--space-2); pointer-events: none; align-items: center;
        }
        .toast {
            padding: var(--space-3) var(--space-5);
            background: var(--dark);
            border: 1px solid rgba(201,150,43,0.25);
            border-radius: var(--radius-lg);
            color: var(--gold-light);
            font-size: var(--text-sm);
            font-family: var(--font-body);
            font-weight: 700;
            display: flex; align-items: center; gap: var(--space-2);
            box-shadow: var(--shadow-lg);
            white-space: nowrap;
            animation: toastIn 0.35s cubic-bezier(0.16,1,0.3,1) forwards;
            pointer-events: auto;
        }
        .toast i { color: var(--gold); }
        .toast.out { animation: toastOut 0.25s ease forwards; }
        @keyframes toastIn { from { opacity:0; transform:translateY(12px) scale(0.95); } to { opacity:1; transform:translateY(0) scale(1); } }
        @keyframes toastOut { to { opacity:0; transform:translateY(-8px) scale(0.95); } }

        /* =============================================
           WHATSAPP FLOAT
        ============================================= */
        .wa-btn {
            position: fixed; bottom: 80px; left: var(--space-4);
            width: 52px; height: 52px;
            background: #25d366; border-radius: var(--radius-full);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 1.4rem; z-index: 150;
            box-shadow: 0 4px 20px rgba(37,211,102,0.4);
            text-decoration: none;
            transition: all 180ms;
        }
        .wa-btn:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(37,211,102,0.5); }

        /* =============================================
           LOADING SCREEN
        ============================================= */
        .loader {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--dark);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: var(--space-4);
            transition: opacity 0.7s, visibility 0.7s;
        }
        .loader.gone { opacity: 0; visibility: hidden; }
        .loader-logo {
            font-family: var(--font-display);
            font-size: 2rem;
            color: var(--gold-light);
            text-align: center;
        }
        .loader-logo small { display: block; font-size: 0.8rem; color: var(--gold-dim); font-weight: 400; margin-top: 4px; }
        .loader-bar { width: 160px; height: 3px; background: rgba(201,150,43,0.15); border-radius: var(--radius-full); overflow: hidden; }
        .loader-fill { height: 100%; width: 0%; background: linear-gradient(to left, var(--gold-light), var(--gold)); border-radius: inherit; transition: width 0.3s; }

        /* =============================================
           DIVIDER ORNAMENT
        ============================================= */
        .ornament-divider {
            text-align: center;
            color: var(--gold-dim);
            font-family: var(--font-display);
            font-size: 1rem;
            opacity: 0.4;
            margin: var(--space-6) 0;
            letter-spacing: 6px;
        }

        /* =============================================
           SECTION SCROLL ANIMATION
        ============================================= */
        .menu-section { opacity: 0; transform: translateY(16px); transition: opacity 0.4s, transform 0.4s; }
        .menu-section.visible { opacity: 1; transform: translateY(0); }

        /* =============================================
           RESPONSIVE
        ============================================= */
        @media (min-width: 600px) {
            .items-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 480px) {
            .hero { padding: var(--space-8) var(--space-4) var(--space-6); }
            .menu-main { padding: var(--space-6) var(--space-4) 110px; }
            .controls-bar { padding: var(--space-3) var(--space-4); }
            .item-desc { display: none; }
            .site-header { padding: var(--space-3) var(--space-4); }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>

        <circle cx="32" cy="20" r="1.5" fill="#5A8020" opacity=".7"/>
        <circle cx="26" cy="22" r="1.5" fill="#6A9030" opacity=".7"/>
        <!-- cinnamon dusting -->
        <path d="M20 16 Q24 15 28 16 Q32 15 34 16" stroke="#8B4010" stroke-width="1" stroke-linecap="round" opacity=".4"/>
      </svg>`,

      'بقلاوة مشكلة': `<svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="26" cy="46" rx="18" ry="4" fill="#C88020" opacity=".2"/>
        <!-- baklava piece diamond shape -->
        <path d="M26 12 L42 26 L26 40 L10 26Z" fill="#E8B030"/>
        <path d="M26 14 L40 26 L26 38 L12 26Z" fill="#F0C040"/>
        <!-- layers -->
        <line x1="14" y1="22" x2="38" y2="22" stroke="#D4A010" stroke-width="1" opacity=".5"/>
        <line x1="14" y1="30" x2="38" y2="30" stroke="#D4A010" stroke-width="1" opacity=".5"/>
        <!-- walnut center -->
        <circle cx="26" cy="26" r="5" fill="#8B6320"/>
        <path d="M24 24 Q26 22 28 24 Q28 28 26 28 Q24 28 24 24Z" fill="#C09040"/>
        <!-- honey glaze -->
        <path class="anim-drip" d="M16 26 Q12 28 10 32" stroke="#E8A020" stroke-width="2" fill="none" stroke-linecap="round" opacity=".8"/>
        <path class="anim-drip" d="M36 26 Q40 28 42 32" stroke="#E8A020" stroke-width="2" fill="none" stroke-linecap="round" opacity=".8"/>
      </svg>`,

      'قطايف بالجبن': `<svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="26" cy="44" rx="16" ry="4" fill="#C88020" opacity=".2"/>
        <!-- qatayef shape (folded pancake) -->
        <path d="M10 32 Q10 16 26 16 Q42 16 42 32 Q36 44 26 44 Q16 44 10 32Z" fill="#E8B840"/>
        <path d="M12 32 Q12 18 26 18 Q40 18 40 32 Q35 43 26 43 Q17 43 12 32Z" fill="#F0C850"/>
        <!-- cheese filling visible at seam -->
        <line x1="26" y1="18" x2="26" y2="44" stroke="#FFFFF0" stroke-width="2" opacity=".6"/>
        <!-- syrup drip -->
        <path class="anim-drip" d="M18 42 Q17 46 16 48" stroke="#E8A020" stroke-width="2.5" fill="none" stroke-linecap="round" opacity=".9"/>
        <path class="anim-drip" d="M34 42 Q35 46 36 48" stroke="#E8A020" stroke-width="2.5" fill="none" stroke-linecap="round" opacity=".9"/>
        <!-- sesame on top -->
        <circle cx="22" cy="22" r="1" fill="#E8D070"/>
        <circle cx="26" cy="20" r="1" fill="#E8D070"/>
        <circle cx="30" cy="22" r="1" fill="#E8D070"/>
        <!-- steam -->
        <path class="anim-steam" d="M22 14 Q20 10 22 8" stroke="#ccc" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <path class="anim-steam2" d="M30 14 Q28 10 30 8" stroke="#ccc" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      </svg>`,
    };

    // Default SVG by category
    const CAT_DEFAULT_SVGS = {
      meat: FOOD_SVGS['كباب حلة'],
      poultry: FOOD_SVGS['فراخ مشوية كاملة'],
      seafood: FOOD_SVGS['سمك مشوي'],
      classic: FOOD_SVGS['فول مدمس بالزيت الحار'],
      sandwiches: FOOD_SVGS['سندوتش هامبرجر'],
      sides: FOOD_SVGS['سلطة خضراء'],
      drinks: FOOD_SVGS['عصير برتقال'],
      desserts: FOOD_SVGS['كنافة نابلسي'],
    };

    function getItemSVG(itemName, catId) {
      return FOOD_SVGS[itemName] || CAT_DEFAULT_SVGS[catId] || '';
    }

    const STATE = { cart: [], favs: new Set(), query: '', cat: 'all' };
    const $ = s => document.querySelector(s);
    const $$ = s => document.querySelectorAll(s);

    /* ---- RENDER MENU ---- */
    function renderMenu() {
        const q = STATE.query.trim().toLowerCase();
        let cats = MENU;
        if (STATE.cat !== 'all') cats = cats.filter(c => c.id === STATE.cat);
        if (q) cats = cats.map(c => ({...c, items: c.items.filter(i =>
            i.name.toLowerCase().includes(q) || (i.desc && i.desc.toLowerCase().includes(q))
        )})).filter(c => c.items.length);

        const main = $('#menuMain');
        if (!cats.length || cats.every(c => !c.items.length)) {
            main.innerHTML = `<div class="empty-state">
                <div class="empty-icon"><i class="fas fa-search"></i></div>
                <h3>لا توجد نتائج</h3>
                <p>جرب البحث بكلمات مختلفة أو اختر قسمًا آخر</p>
            </div>`;
            return;
        }

        main.innerHTML = cats.map(cat => `
            <section class="menu-section" data-cat="${cat.id}" id="sec-${cat.id}">
                <div class="section-header">
                    <div class="section-icon"><i class="fas ${cat.icon}"></i></div>
                    <div class="section-info">
                        <h2 class="section-title">${cat.name}</h2>
                        <div class="section-count">${cat.items.length} أطباق</div>
                    </div>
                    <div class="section-line"></div>
                </div>
                <div class="items-grid">
                    ${cat.items.map(item => renderItem(item, cat.id)).join('')}
                </div>
            </section>
        `).join(`<div class="ornament-divider">✦ ✦ ✦</div>`);

        // animate sections in
        requestAnimationFrame(() => {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
            }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
            $$('.menu-section').forEach(s => obs.observe(s));
        });
    }

    function renderItem(item, catId) {
        const fav = STATE.favs.has(item.name);
        const svgIcon = getItemSVG(item.name, catId);
        return `<div class="menu-item">
            <button class="item-fav ${fav ? 'on' : ''}" data-name="${esc(item.name)}"
                onclick="toggleFav('${esc(item.name)}', this)" aria-label="إضافة للمفضلة">
                <i class="${fav ? 'fas' : 'far'} fa-heart"></i>
            </button>
            ${svgIcon ? `<div class="item-svg-icon">${svgIcon}</div>` : ''}
            <div class="item-body">
                <div class="item-name">${item.name}</div>
                ${item.desc ? `<div class="item-desc">${item.desc}</div>` : ''}
            </div>
            <div class="item-right">
                <div>
                    <div class="item-price">${item.price}</div>
                    <div class="item-currency">ريال سعودي</div>
                </div>
                <button class="add-btn" onclick="addToCart('${esc(item.name)}', ${item.price})" aria-label="إضافة للسلة">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
        </div>`;
    }

    function esc(s) { return s.replace(/'/g, "\'").replace(/"/g, '&quot;'); }

    /* ---- CATEGORIES NAV ---- */
    function buildCatNav() {
        const strip = $('#catStrip');
        const cats = [{id:'all', name:'الكل', icon:'fa-th-large'}, ...MENU.map(c => ({id:c.id, name:c.name, icon:c.icon}))];
        strip.innerHTML = cats.map(c => `
            <button class="cat-pill ${c.id === STATE.cat ? 'active' : ''}" data-cat="${c.id}">
                <i class="fas ${c.icon}"></i> ${c.name}
            </button>
        `).join('');
        strip.addEventListener('click', e => {
            const btn = e.target.closest('.cat-pill');
            if (!btn) return;
            STATE.cat = btn.dataset.cat;
            $$('.cat-pill').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMenu();
        });
    }

    /* ---- CART ---- */
    function addToCart(name, price) {
        const ex = STATE.cart.find(c => c.name === name);
        if (ex) ex.qty++;
        else STATE.cart.push({ name, price, qty: 1 });
        updateCartBadge();
        renderCartPanel();
        toast(`تمت إضافة "${name}"`, 'fa-check-circle');
        flyDot();
    }

    function changeQty(i, d) {
        STATE.cart[i].qty += d;
        if (STATE.cart[i].qty <= 0) STATE.cart.splice(i, 1);
        updateCartBadge(); renderCartPanel();
    }

    function removeFromCart(i) {
        STATE.cart.splice(i, 1);
        updateCartBadge(); renderCartPanel();
    }

    function updateCartBadge() {
        const n = STATE.cart.reduce((s, c) => s + c.qty, 0);
        ['#cartBadge', '#navBadge'].forEach(sel => {
            const el = $(sel); if (!el) return;
            el.textContent = n; el.classList.toggle('show', n > 0);
        });
    }

    function renderCartPanel() {
        const body = $('#cartBody'), foot = $('#cartFoot');
        const total = STATE.cart.reduce((s, c) => s + c.price * c.qty, 0);
        if (!STATE.cart.length) {
            body.innerHTML = `<div class="empty-state">
                <div class="empty-icon"><i class="fas fa-shopping-bag"></i></div>
                <h3>السلة فارغة</h3>
                <p>أضف أطباقك المفضلة لتبدأ طلبك</p>
            </div>`;
            foot.style.display = 'none';
        } else {
            body.innerHTML = STATE.cart.map((c, i) => `
                <div class="cart-item">
                    <div class="cart-name">${c.name}</div>
                    <div class="qty-ctrl">
                        <button class="qty-btn" onclick="changeQty(${i},-1)"><i class="fas fa-minus"></i></button>
                        <span class="qty-num">${c.qty}</span>
                        <button class="qty-btn" onclick="changeQty(${i},1)"><i class="fas fa-plus"></i></button>
                    </div>
                    <div class="cart-price">${c.price * c.qty} ﷼</div>
                    <button class="del-btn" onclick="removeFromCart(${i})" aria-label="حذف"><i class="fas fa-trash-alt"></i></button>
                </div>
            `).join('');
            foot.style.display = 'block';
            $('#cartTotal').textContent = total + ' ريال سعودي';
        }
    }

    /* ---- FAVS ---- */
    function toggleFav(name, btn) {
        if (STATE.favs.has(name)) {
            STATE.favs.delete(name);
            if (btn) { btn.classList.remove('on'); btn.querySelector('i').className = 'far fa-heart'; }
            toast(`تمت إزالة "${name}" من المفضلة`, 'fa-heart');
        } else {
            STATE.favs.add(name);
            if (btn) { btn.classList.add('on'); btn.querySelector('i').className = 'fas fa-heart'; }
            toast(`تمت إضافة "${name}" للمفضلة`, 'fa-heart');
        }
    }

    function renderFavsPanel() {
        const all = MENU.flatMap(c => c.items);
        const favItems = all.filter(i => STATE.favs.has(i.name));
        const body = $('#favsBody');
        if (!favItems.length) {
            body.innerHTML = `<div class="empty-state">
                <div class="empty-icon"><i class="fas fa-heart"></i></div>
                <h3>لا توجد مفضلات</h3>
                <p>اضغط على قلب أي طبق لإضافته للمفضلة</p>
            </div>`;
        } else {
            body.innerHTML = favItems.map(item => renderItem(item)).join('');
        }
    }

    /* ---- PANELS ---- */
    function openPanel(ovl, panel) { $(ovl).classList.add('open'); $(panel).classList.add('open'); }
    function closePanel(ovl, panel) { $(ovl).classList.remove('open'); $(panel).classList.remove('open'); }

    /* ---- TOAST ---- */
    function toast(msg, ico = 'fa-info-circle') {
        const t = document.createElement('div');
        t.className = 'toast';
        t.innerHTML = `<i class="fas ${ico}"></i><span>${msg}</span>`;
        $('#toastStack').appendChild(t);
        setTimeout(() => { t.classList.add('out'); setTimeout(() => t.remove(), 250); }, 2200);
    }

    /* ---- FLY DOT ---- */
    function flyDot() {
        const btn = event?.target?.closest('.add-btn');
        if (!btn) return;
        const r = btn.getBoundingClientRect();
        const dot = document.createElement('div');
        dot.style.cssText = `position:fixed;width:10px;height:10px;background:var(--gold);border-radius:50%;
            left:${r.left + r.width/2}px;top:${r.top + r.height/2}px;z-index:9999;pointer-events:none;`;
        document.body.appendChild(dot);
        const cart = $('#cartBtn').getBoundingClientRect();
        dot.animate([
            { transform:'translate(0,0) scale(1)', opacity:1 },
            { transform:`translate(${cart.left - r.left}px, ${cart.top - r.top}px) scale(0.2)`, opacity:0.3 }
        ], { duration: 420, easing:'cubic-bezier(0.16,1,0.3,1)' }).onfinish = () => dot.remove();
    }

    /* ---- WHATSAPP ORDER ---- */
    function waOrder() {
        if (!STATE.cart.length) return;
        const total = STATE.cart.reduce((s, c) => s + c.price * c.qty, 0);
        let msg = '*السلام عليكم* من فضلكم أريد هذه الطلبات :\n\n';
        STATE.cart.forEach(c => {
            msg += `• ${c.name}`;
            if (c.qty > 1) msg += ` × ${c.qty}`;
            msg += ` = ${c.price * c.qty} ريال\n`;
        });
        msg += `\nــــــــــــــــــــ\n`;
        msg += `المجموع الكلي : ${total} ريال سعودي\n\nوشكراً 🙏`;
        open(`https://wa.me/966500000000?text=${encodeURIComponent(msg)}`, '_blank');
    }

    /* ---- INIT ---- */
    function init() {
        buildCatNav();
        renderMenu();
        renderCartPanel();

        // Search
        let searchTimer;
        $('#searchInput').addEventListener('input', e => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => { STATE.query = e.target.value; renderMenu(); }, 280);
        });

        // Cart
        $('#cartBtn').addEventListener('click', () => { renderCartPanel(); openPanel('#cartOverlay', '#cartPanel'); });
        $('#cartClose').addEventListener('click', () => closePanel('#cartOverlay', '#cartPanel'));
        $('#cartOverlay').addEventListener('click', () => closePanel('#cartOverlay', '#cartPanel'));
        $('#waOrderBtn').addEventListener('click', waOrder);

        // Favs
        $('#favsBtn').addEventListener('click', () => { renderFavsPanel(); openPanel('#favsOverlay', '#favsPanel'); });
        $('#favsClose').addEventListener('click', () => closePanel('#favsOverlay', '#favsPanel'));
        $('#favsOverlay').addEventListener('click', () => closePanel('#favsOverlay', '#favsPanel'));

        // Bottom nav
        $$('.nav-item').forEach(b => b.addEventListener('click', () => {
            $$('.nav-item').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            const tab = b.dataset.tab;
            if (tab === 'search') { $('#searchInput').focus(); }
            else if (tab === 'favs') { renderFavsPanel(); openPanel('#favsOverlay', '#favsPanel'); }
            else if (tab === 'cart') { renderCartPanel(); openPanel('#cartOverlay', '#cartPanel'); }
        }));

        // Keyboard
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                closePanel('#cartOverlay', '#cartPanel');
                closePanel('#favsOverlay', '#favsPanel');
            }
        });

        // Loader
        const fill = $('#loaderFill'); let prog = 0;
        const iv = setInterval(() => {
            prog += Math.random() * 15 + 8;
            if (prog >= 100) {
                prog = 100; fill.style.width = '100%';
                clearInterval(iv);
                setTimeout(() => { $('#loader').classList.add('gone'); }, 500);
            } else fill.style.width = prog + '%';
        }, 100);
    }

    document.addEventListener('DOMContentLoaded', init);
    </script>

    <!-- ═══ PWA BOOTSTRAP ═══ -->
    <script>
    (function() {
        /* ── Service Worker — external sw.js ── */
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js', { scope: './' })
                .then(r => console.log('[PWA] SW registered', r.scope))
                .catch(e => console.warn('[PWA] SW failed:', e));
        }


        /* ── Service Worker (inline via Blob) ── */
        if ('serviceWorker' in navigator) {
            const CACHE = 'taybeen-v1';
            const swCode = `
const CACHE_NAME = '${CACHE}';
const ASSETS = ['./', location.href];

self.addEventListener('install', e => {
    e.waitUntil(
        caches.open(CACHE_NAME).then(c => c.addAll(ASSETS).catch(() => {}))
    );
    self.skipWaiting();
});

self.addEventListener('activate', e => {
    e.waitUntil(
        caches.keys().then(keys =>
            Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))
        )
    );
    self.clients.claim();
});

self.addEventListener('fetch', e => {
    if (e.request.method !== 'GET') return;
    e.respondWith(
        caches.match(e.request).then(cached => {
            if (cached) return cached;
            return fetch(e.request).then(res => {
                if (!res || res.status !== 200 || res.type === 'opaque') return res;
                const clone = res.clone();
                caches.open(CACHE_NAME).then(c => c.put(e.request, clone));
                return res;
            }).catch(() => caches.match('./'));
        })
    );
});
`;
            const swBlob = new Blob([swCode], { type: 'text/javascript' });
            const swUrl = URL.createObjectURL(swBlob);
            navigator.serviceWorker.register(swUrl, { scope: './' })
                .then(r => console.log('[PWA] SW registered', r.scope))
                .catch(e => console.warn('[PWA] SW failed:', e));
        }

        /* ── Install Prompt Banner ── */
        let deferredPrompt = null;
        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            deferredPrompt = e;
            showInstallBanner();
        });

        function showInstallBanner() {
            if (document.getElementById('installBanner')) return;
            const banner = document.createElement('div');
            banner.id = 'installBanner';
            banner.innerHTML = `
                <style>
                #installBanner {
                    position: fixed; bottom: 68px; left: 50%; transform: translateX(-50%);
                    z-index: 8000; background: #1a0f00; border: 1px solid rgba(201,150,43,0.35);
                    border-radius: 14px; padding: 12px 16px;
                    display: flex; align-items: center; gap: 12px;
                    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
                    font-family: 'Cairo', sans-serif;
                    animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
                    max-width: calc(100vw - 32px);
                }
                @keyframes slideUp { from { opacity:0; transform: translateX(-50%) translateY(20px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
                #installBanner .ib-icon { font-size: 1.6rem; flex-shrink: 0; }
                #installBanner .ib-text { flex: 1; }
                #installBanner .ib-title { color: #e8b84b; font-weight: 800; font-size: 0.9rem; }
                #installBanner .ib-sub { color: rgba(230,217,194,0.6); font-size: 0.72rem; font-weight: 400; margin-top: 2px; }
                #installBanner .ib-install {
                    background: #c9962b; color: #1a0f00; border: none;
                    border-radius: 8px; padding: 8px 14px;
                    font-family: 'Cairo', sans-serif; font-size: 0.8rem; font-weight: 800;
                    cursor: pointer; flex-shrink: 0; transition: background 0.2s;
                }
                #installBanner .ib-install:hover { background: #e8b84b; }
                #installBanner .ib-close {
                    background: none; border: none; color: rgba(230,217,194,0.4);
                    font-size: 1rem; cursor: pointer; padding: 4px; flex-shrink: 0;
                }
                </style>
                <span class="ib-icon">🍽️</span>
                <div class="ib-text">
                    <div class="ib-title">ثبّت التطبيق</div>
                    <div class="ib-sub">أضف مطعم الطيبين على الشاشة الرئيسية</div>
                </div>
                <button class="ib-install" id="installBtn">تثبيت</button>
                <button class="ib-close" id="dismissBtn">✕</button>
            `;
            document.body.appendChild(banner);
            document.getElementById('installBtn').addEventListener('click', async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                banner.remove();
                if (outcome === 'accepted') {
                    const t = document.createElement('div');
                    t.className = 'toast';
                    t.innerHTML = '<i class="fas fa-check-circle"></i><span>تم تثبيت التطبيق بنجاح!</span>';
                    document.getElementById('toastStack')?.appendChild(t);
                    setTimeout(() => { t.classList.add('out'); setTimeout(() => t.remove(), 250); }, 2500);
                }
            });
            document.getElementById('dismissBtn').addEventListener('click', () => banner.remove());
        }

        /* ── iOS Manual Install Hint ── */
        const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
        const isStandalone = window.navigator.standalone === true;
        if (isIOS && !isStandalone) {
            setTimeout(() => {
                const hint = document.createElement('div');
                hint.style.cssText = `position:fixed;bottom:68px;left:50%;transform:translateX(-50%);
                    z-index:8000;background:#1a0f00;border:1px solid rgba(201,150,43,0.35);
                    border-radius:14px;padding:12px 16px;font-family:Cairo,sans-serif;
                    text-align:center;max-width:calc(100vw - 32px);
                    box-shadow:0 8px 32px rgba(0,0,0,0.4);`;
                hint.innerHTML = `
                    <div style="color:#e8b84b;font-weight:800;font-size:0.9rem;margin-bottom:4px;">📲 أضف للشاشة الرئيسية</div>
                    <div style="color:rgba(230,217,194,0.65);font-size:0.72rem;line-height:1.7;">
                        اضغط على <strong style="color:#e8b84b;">مشاركة</strong> ⬆️ ثم اختر<br>
                        <strong style="color:#e8b84b;">"إضافة إلى الشاشة الرئيسية"</strong>
                    </div>
                    <button onclick="this.parentElement.remove()" style="margin-top:10px;background:#c9962b;color:#1a0f00;border:none;border-radius:8px;padding:6px 18px;font-family:Cairo,sans-serif;font-weight:800;font-size:0.8rem;cursor:pointer;">حسناً</button>`;
                document.body.appendChild(hint);
            }, 3000);
        }

        /* ── Online/Offline indicator ── */
        function netStatus() {
            const offline = !navigator.onLine;
            let bar = document.getElementById('netBar');
            if (!bar) {
                bar = document.createElement('div');
                bar.id = 'netBar';
                bar.style.cssText = `position:fixed;top:0;left:0;right:0;z-index:9999;
                    padding:6px;text-align:center;font-family:Cairo,sans-serif;
                    font-size:0.75rem;font-weight:700;transition:all 0.3s;`;
                document.body.appendChild(bar);
            }
            if (offline) {
                bar.style.background = '#c84040'; bar.style.color = '#fff';
                bar.textContent = '⚠️ أنت غير متصل بالإنترنت — التطبيق يعمل بدون اتصال';
                bar.style.display = 'block';
            } else {
                bar.style.display = 'none';
            }
        }
        window.addEventListener('online', netStatus);
        window.addEventListener('offline', netStatus);
        netStatus();
    })();
    </script>

</body>
